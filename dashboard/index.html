<!DOCTYPE html>
<html>
<head>
    <title>NetSentinel Dashboard</title>
</head>
<body>

<h1>🚨 NetSentinel Dashboard</h1>

<h2>Alerts</h2>
<ul id="alerts"></ul>

<script>
async function loadAlerts() {
    let res = await fetch("http://127.0.0.1:8000/alerts");
    let data = await res.json();

    let list = document.getElementById("alerts");
    list.innerHTML = "";

    data.slice(-10).reverse().forEach(log => {
        let li = document.createElement("li");
        li.innerText = `${log.timestamp} | ${log.ip} | ${log.event} | ${log.action}`;
        list.appendChild(li);
    });
}

setInterval(loadAlerts, 2000);
</script>

</body>
</html>
